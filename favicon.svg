<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">

  <defs>
    <linearGradient id="qGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#EEF2FF"/>
      <stop offset="100%" stop-color="#8B9CFF"/>
    </linearGradient>
  </defs>

  <!-- Bold Q Ring -->
  <circle
    cx="32"
    cy="32"
    r="20"
    fill="none"
    stroke="url(#qGrad)"
    stroke-width="9"
    stroke-linecap="round"
  />

  <!-- Premium Tail (slightly curved instead of straight line) -->
  <path
    d="M44 44 Q52 52 56 56"
    stroke="url(#qGrad)"
    stroke-width="9"
    stroke-linecap="round"
    fill="none"
  />

</svg>